name: Linux Development Workflow

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-development:
    name: Bootstrap, check, and test on Linux
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14.6'

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24.15.0'
          package-manager-cache: false

      - name: Install system development tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64" \
            -o /usr/local/bin/shfmt
          curl -fsSL "https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-Linux-x86_64" \
            -o /usr/local/bin/hadolint
          sudo chmod +x /usr/local/bin/shfmt /usr/local/bin/hadolint

      - name: Install uv
        run: python -m pip install uv

      - name: Bootstrap exactly as documented
        run: make bootstrap

      - name: Run strict Linux checks
        run: make check

      - name: Run test suite
        run: make test

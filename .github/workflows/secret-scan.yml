name: Secret Scan

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  trufflehog:
    name: Block committed secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@e1f9e5d1d55d12e4a976f06deef4ccf20e099644 # main
        with:
          version: 3.95.9
          extra_args: --results=verified,unknown --fail-on-scan-errors

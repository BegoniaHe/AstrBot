name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gates:
    name: Run focused quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Install dependencies
        run: uv sync --group dev --locked

      - name: Verify Python lockfile
        run: uv lock --check

      - name: Run focused Pyright checks
        run: uv run pyright --project pyrightconfig.quality.json

      - name: Run Bandit checks
        run: |
          PYTHONIOENCODING=utf-8 uv run bandit -ll -ii -r astrbot -c pyproject.toml

      - name: Audit dependencies
        run: uv run pip-audit --strict

      - name: Audit frontend dependencies
        working-directory: dashboard
        run: |
          corepack enable
          corepack pnpm install --frozen-lockfile
          corepack pnpm audit --audit-level=low

      - name: Enforce complexity baseline
        run: >
          uv run ruff check --select C901
          --config "lint.mccabe.max-complexity=40" astrbot

      - name: Report complexity
        run: |
          uv run radon cc \
            astrbot/api \
            astrbot/cli \
            astrbot/core/backup \
            astrbot/core/config \
            astrbot/core/event_bus.py \
            astrbot/core/knowledge_base \
            astrbot/core/pipeline/respond \
            astrbot/core/pipeline/waking_check \
            astrbot/core/platform \
            astrbot/core/skills \
            astrbot/core/star/context.py \
            astrbot/core/umop_config_router.py \
            astrbot/utils \
            -s -n C
          uv run radon mi \
            astrbot/api \
            astrbot/cli \
            astrbot/core/backup \
            astrbot/core/config \
            astrbot/core/event_bus.py \
            astrbot/core/knowledge_base \
            astrbot/core/pipeline/respond \
            astrbot/core/pipeline/waking_check \
            astrbot/core/platform \
            astrbot/core/skills \
            astrbot/core/star/context.py \
            astrbot/core/umop_config_router.py \
            astrbot/utils \
            -s

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1280,height=900"/>
  <title>AstrBot Help {{ version }}</title>
  <style>
    :root {
      --bg: #eef3fb;
      --paper: rgba(255, 255, 255, 0.94);
      --paper-border: rgba(17, 38, 89, 0.1);
      --text: #15213a;
      --muted: #5e6d89;
      --accent: #2f65d9;
      --accent-soft: rgba(47, 101, 217, 0.1);
      --shadow: 0 22px 60px rgba(17, 38, 89, 0.12);
      --mono: "Cascadia Code", "Consolas", "SFMono-Regular", monospace;
      --sans: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(47, 101, 217, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(31, 165, 129, 0.14), transparent 24%),
        linear-gradient(180deg, #f7f9fd 0%, #eef3fb 52%, #e7eef9 100%);
      color: var(--text);
      font-family: var(--sans);
    }

    body {
      padding: 42px 34px 54px;
    }

    .sheet {
      width: 1040px;
      max-width: 100%;
      margin: 0 auto;
      padding: 32px 34px 28px;
      border-radius: 28px;
      background: var(--paper);
      border: 1px solid var(--paper-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .masthead {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(17, 38, 89, 0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background:
        linear-gradient(145deg, #1f6be0, #1fb58c);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
      position: relative;
    }

    .brand-mark::after {
      content: "A";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 24px;
      letter-spacing: 0.04em;
    }

    .brand-copy h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .brand-copy p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      max-width: 520px;
    }

    .version-chip {
      flex: 0 0 auto;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(17, 38, 89, 0.08);
    }

    #content {
      font-size: 16px;
      line-height: 1.72;
    }

    #content > :first-child {
      margin-top: 0;
    }

    h1 {
      display: none;
    }

    h2 {
      margin: 30px 0 14px;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    p,
    ul,
    ol,
    blockquote {
      margin: 12px 0;
    }

    code {
      font-family: var(--mono);
    }

    blockquote {
      margin: 16px 0;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--accent-soft);
      border-left: 4px solid var(--accent);
      color: var(--text);
    }

    blockquote p {
      margin: 0;
    }

    .help-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 6px 0 18px;
    }

    .help-pill {
      display: inline-flex;
      align-items: center;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(17, 38, 89, 0.08);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .help-callout {
      margin: 0 0 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(47, 101, 217, 0.12), rgba(31, 181, 140, 0.08));
      border: 1px solid rgba(47, 101, 217, 0.1);
      color: var(--text);
    }

    .help-section h2 {
      margin-top: 0;
    }

    .help-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin: 18px 0 6px;
    }

    .help-card {
      min-height: 118px;
      padding: 16px 16px 15px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(17, 38, 89, 0.08);
      box-shadow: 0 12px 28px rgba(17, 38, 89, 0.08);
      break-inside: avoid;
    }

    .help-card__command {
      margin-bottom: 10px;
    }

    .help-card__command code {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 12px;
      background: #13264e;
      color: #f5f8ff;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .help-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .notice-box {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(21, 33, 58, 0.04);
      border: 1px solid rgba(17, 38, 89, 0.08);
      color: var(--muted);
    }

    .notice-box h2 {
      margin-top: 0;
    }

    .footer {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid rgba(17, 38, 89, 0.08);
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    @media (max-width: 920px) {
      body {
        padding: 24px 18px 30px;
      }

      .sheet {
        padding: 24px 20px 22px;
        border-radius: 22px;
      }

      .masthead {
        flex-direction: column;
        align-items: flex-start;
      }

      .help-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .help-grid {
        grid-template-columns: 1fr;
      }

      .brand-copy h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="sheet">
    <header class="masthead">
      <div class="brand">
        <div class="brand-mark"></div>
        <div class="brand-copy">
          <h1>AstrBot Help</h1>
        </div>
      </div>
      <div class="version-chip">Rendered by AstrBot {{ version }}</div>
    </header>

    <article id="content">{{ text | safe }}</article>

    <div class="footer">AstrBot {{ version }}</div>
  </div>
</body>
</html>
